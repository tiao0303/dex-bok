# 线上部署用此 baseURL；本地预览请用：hugo server --baseURL http://localhost:1313/
# 然后访问 http://localhost:1313/（不要用 /dex-bok/，否则静态资源 404、MIME 错、样式乱）
baseURL = "https://tiao0303.github.io/dex-bok/"
languageCode = "zh-cn"
title = "DEX 学习笔记 | 去中心化交易所实战指南"
theme = "ananke"
paginate = 10

[params]
  description = "个人 DEX 理论与实战心得 - AMM 原理、流动性策略、MEV 防护、链上数据分析"
  # 相对 baseURL，避免子路径部署（如 GitHub Pages /dex-bok/）下 404
  featured_image = "images/og-image.png"
  favicon = "favicon.ico"
  custom_css = ["css/custom.css"]
  darkMode = true
  author = "QingHeart Qin"
  # 顶栏浅色，与 custom.css 清爽风格一致
  background_color_class = "bg-white"
  github = "https://github.com/yang"
  twitter = "https://twitter.com/yang"

[params.logo]
  text = "🦞 DEX 学习笔记"

[menu]
  [[menu.main]]
    name = "写文章"
    url = "/editor/"
    weight = 0
  [[menu.main]]
    name = "首页"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "文章"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    name = "教程"
    url = "/guides/"
    weight = 3
  [[menu.main]]
    name = "工具"
    url = "/tools/"
    weight = 4
  [[menu.main]]
    name = "关于"
    url = "/about/"
    weight = 5

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[taxonomies]
  tag = "tags"
  category = "categories"
