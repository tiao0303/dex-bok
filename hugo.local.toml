# 本地开发用此配置
baseURL = "http://localhost:1313/"
languageCode = "zh-cn"
title = "DEX 学习笔记 | 去中心化交易所实战指南"
theme = "ananke"
paginate = 10

[params]
  description = "个人 DEX 理论与实战心得 - AMM 原理、流动性策略、MEV 防护、链上数据分析"
  featured_image = "images/og-image.png"
  favicon = "favicon.ico"
  custom_css = ["css/custom.css"]
  darkMode = true
  author = "QingHeart Qin"
  background_color_class = "bg-dark"
  github = "https://github.com/tiao0303"
  twitter = "https://x.com/qing87762"

[params.logo]
  text = "🦞 DEX 学习笔记"

[menu]
  [[menu.main]]
    name = "写文章"
    url = "/editor/"
    weight = 0
  [[menu.main]]
    name = "首页"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "文章"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    name = "教程"
    url = "/guides/"
    weight = 3
  [[menu.main]]
    name = "工具"
    url = "/tools/"
    weight = 4
  [[menu.main]]
    name = "关于"
    url = "/about/"
    weight = 5

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[taxonomies]
  tag = "tags"
  category = "categories"
