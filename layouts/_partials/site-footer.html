<footer class="geek-footer">
  <div class="container">
    <div class="geek-footer-inner">
      <div class="geek-footer-brand">
        <a href="{{ .Site.Home.Permalink }}" class="geek-footer-logo">
          <span class="logo-icon">🦞</span>
          <span>{{ .Site.Title }}</span>
        </a>
        <p class="geek-footer-desc">DEX 理论与实战心得 - AMM 原理、流动性策略、MEV 防护、链上数据分析</p>
      </div>
      <div class="geek-footer-links">
        <div class="geek-footer-col">
          <h4>导航</h4>
          <ul>
            <li><a href="/">首页</a></li>
            <li><a href="/posts/">文章</a></li>
            <li><a href="/guides/">教程</a></li>
            <li><a href="/tools/">工具</a></li>
          </ul>
        </div>
        <div class="geek-footer-col">
          <h4>关于</h4>
          <ul>
            <li><a href="/about/">关于本站</a></li>
            <li><a href="/editor/">写文章</a></li>
          </ul>
        </div>
        <div class="geek-footer-col">
          <h4>关注</h4>
          <ul>
            <li><a href="{{ .Site.Params.github }}" target="_blank" rel="noopener">GitHub</a></li>
            <li><a href="{{ .Site.Params.twitter }}" target="_blank" rel="noopener">Twitter</a></li>
          </ul>
        </div>
      </div>
    </div>
    <div class="geek-footer-bottom">
      <p>&copy; {{ now.Format "2006"}} {{ with .Site.Copyright | default .Site.Title }} {{ . | safe.HTML }} {{ end }}</p>
